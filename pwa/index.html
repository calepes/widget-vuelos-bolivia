<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Salidas — Aeropuertos Bolivia</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      background: #111;
      color: #FFD600;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .board {
      background:
        radial-gradient(circle, #1a1a1a 0.5px, transparent 0.5px),
        #0d0d0d;
      background-size: 4px 4px;
      padding: max(14px, env(safe-area-inset-top)) 10px 14px 10px;
      min-height: 100vh;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Header */
    .board-header {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }
    .board-header .icon {
      font-size: 28px;
      margin-right: 10px;
    }
    .board-header .title {
      flex: 1;
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 3px;
    }
    .board-header .clock {
      font-size: 18px;
      font-weight: bold;
      color: #4CAF50;
      letter-spacing: 1px;
    }
    .refresh-btn {
      background: none;
      border: none;
      color: #4CAF50;
      font-size: 18px;
      cursor: pointer;
      margin-left: 6px;
      padding: 2px 4px;
      opacity: 0.6;
    }

    /* Airport selector */
    .airport-row {
      margin-bottom: 10px;
      position: relative;
    }
    .airport-row select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: #1a1a1a;
      color: #FFD600;
      border: 1px solid #333;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 8px 30px 8px 12px;
      cursor: pointer;
    }
    .airport-row::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 12px;
      pointer-events: none;
    }
    .refresh-btn:active { opacity: 0.3; }
    .refresh-btn.spinning { animation: spin 0.8s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Column headers */
    .col-headers {
      display: flex;
      gap: 1px;
      padding: 8px 0;
      border-bottom: 2px solid #666;
      margin-bottom: 6px;
    }
    .col-label {
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #CCCCCC;
      letter-spacing: 1px;
    }
    .col-time { flex: 5; }
    .col-sep { flex: 1.5; }
    .col-dest { flex: 11; }
    .col-flight { flex: 6; }
    .col-rmks { flex: 9; }

    /* Flight rows */
    .flight-row {
      display: flex;
      gap: 1px;
      margin-bottom: 2px;
    }

    /* Column groups within a row */
    .col-group {
      display: flex;
      gap: 1px;
    }
    .cg-time { flex: 5; }
    .cg-sep { flex: 1.5; }
    .cg-dest { flex: 11; }
    .cg-flight { flex: 6; }
    .cg-rmks { flex: 9; }

    /* Flap cards */
    .flap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      height: 24px;
      background: #1C1C1E;
      border-radius: 2px;
      font-weight: bold;
      font-size: clamp(9px, 2.8vw, 14px);
    }
    .flap-colon { flex: 0.4; }
    .flap-sep { background: #1C1C1E; }

    /* Status message */
    #status {
      text-align: center;
      padding: 30px 0;
      font-size: 13px;
      color: #555;
    }
    #status.error { color: #FF3D00; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 10px 0;
      font-size: 9px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="board">
    <div class="board-header">
      <span class="icon">&#x1F6EB;</span>
      <div class="title">DEPARTURES</div>
      <span class="clock" id="clock"></span>
      <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">&#x21BB;</button>
    </div>
    <div class="airport-row">
      <select id="airport-select"></select>
    </div>
    <div class="col-headers">
      <span class="col-label col-time">TIME</span>
      <span class="col-label col-sep"></span>
      <span class="col-label col-dest">DESTINATION</span>
      <span class="col-label col-sep"></span>
      <span class="col-label col-flight">FLIGHT</span>
      <span class="col-label col-sep"></span>
      <span class="col-label col-rmks">REMARKS</span>
    </div>
    <div id="flights"></div>
    <div id="status">Cargando...</div>
    <div class="footer" id="footer"></div>
  </div>
  <script>
    // ===== CONFIG =====
    const PROXY_URL = 'https://aeropuertos-proxy.carlos-cb4.workers.dev';
    const HOURS_AHEAD = 12;
    const ROW_HEIGHT = 26; // 24px flap + 2px margin

    function maxFlights() {
      const hdr = document.querySelector('.board-header');
      const apt = document.querySelector('.airport-row');
      const cols = document.querySelector('.col-headers');
      const ftr = document.querySelector('.footer');
      const board = document.querySelector('.board');
      const boardStyle = getComputedStyle(board);
      const padTop = parseFloat(boardStyle.paddingTop);
      const padBot = parseFloat(boardStyle.paddingBottom);
      const chrome = padTop + padBot
        + hdr.offsetHeight + parseFloat(getComputedStyle(hdr).marginBottom)
        + apt.offsetHeight + parseFloat(getComputedStyle(apt).marginBottom)
        + cols.offsetHeight + parseFloat(getComputedStyle(cols).marginBottom)
        + ftr.offsetHeight;
      const available = window.innerHeight - chrome;
      return Math.max(5, Math.floor(available / ROW_HEIGHT));
    }
    const DEST_CHARS = 11;
    const RMKS_CHARS = 9;

    // ===== AIRPORTS =====
    const AIRPORTS = {
      VVI: { name: "Viru Viru (VVI)", city: "Santa Cruz", query: "Viru%20Viru" },
      LPB: { name: "El Alto (LPB)", city: "La Paz", query: "El%20Alto" },
      CBB: { name: "Cochabamba (CBB)", city: "Cochabamba", query: "Jorge%20Wilstermann" },
      TJA: { name: "Tarija (TJA)", city: "Tarija", query: "Tarija" },
      SRE: { name: "Sucre (SRE)", city: "Sucre", query: "Sucre" },
      ORU: { name: "Oruro (ORU)", city: "Oruro", query: "Oruro" },
      UYU: { name: "Uyuni (UYU)", city: "Uyuni", query: "Uyuni" },
      CIJ: { name: "Cobija (CIJ)", city: "Cobija", query: "Cobija" },
      RIB: { name: "Riberalta (RIB)", city: "Riberalta", query: "Riberalta" },
      RBQ: { name: "Rurrenabaque (RBQ)", city: "Rurrenabaque", query: "Rurrenabaque" },
      TDD: { name: "Trinidad (TDD)", city: "Trinidad", query: "Trinidad" },
      GYA: { name: "Guayaramerín (GYA)", city: "Guayaramerín", query: "Guayaramerin" }
    };

    // ===== AIRLINE MAPS =====
    const AIRLINE_IATA = {
      "BOLIVIANA DE AVIACION": "OB", "BOLIVIANA DE AVIACIÓN": "OB", "BOA": "OB",
      "ECOJET": "EO", "ECO JET": "EO",
      "AMASZONAS": "Z8",
      "LATAM": "LA", "LATAM AIRLINES": "LA", "LATAM AIRLINES GROUP": "LA",
      "LAN": "LA", "LAN AIRLINES": "LA",
      "SKY": "H2", "AVIANCA": "AV", "COPA": "CM",
      "AMERICAN AIRLINES": "AA", "UNITED": "UA", "IBERIA": "IB", "FLYBONDI": "FU"
    };

    const AIRLINE_BACKUP = {
      "PARANAIR": "PZ", "PARANAIR S.A.": "PZ", "PARANA AIR": "PZ",
      "GOL": "G3", "GOL LINHAS AEREAS": "G3", "GOL LINHAS AÉREAS": "G3",
      "MINERA SAN CRISTOBAL": "MSC", "MINERA SAN CRISTÓBAL": "MSC",
      "AIR EUROPA": "UX", "AIR EUROPA LINEAS AEREAS": "UX", "AIR EUROPA LÍNEAS AÉREAS": "UX"
    };

    // ===== DESTINATION MAP =====
    const DEST_IATA = {
      "SANTA CRUZ": "VVI", "VIRU VIRU": "VVI",
      "LA PAZ": "LPB", "EL ALTO": "LPB",
      "COCHABAMBA": "CBB", "SUCRE": "SRE", "TARIJA": "TJA",
      "ORURO": "ORU", "UYUNI": "UYU", "COBIJA": "CIJ",
      "RIBERALTA": "RIB", "RURRENABAQUE": "RBQ",
      "TRINIDAD": "TDD", "GUAYARAMERIN": "GYA", "GUAYARAMERÍN": "GYA",
      "LIMA": "LIM", "CUSCO": "CUZ", "CUZCO": "CUZ",
      "SANTIAGO": "SCL", "SANTIAGO DE CHILE": "SCL", "IQUIQUE": "IQQ",
      "BUENOS AIRES": "EZE", "SAO PAULO": "GRU", "SÃO PAULO": "GRU",
      "ASUNCION": "ASU", "ASUNCIÓN": "ASU",
      "PANAMA": "PTY", "PANAMÁ": "PTY",
      "MIAMI": "MIA", "MADRID": "MAD", "WASHINGTON": "IAD",
      "BOGOTA": "BOG", "BOGOTÁ": "BOG",
      "PUNTA DEL ESTE": "PDP",
      "TUCUMAN": "TUC", "TUCUMÁN": "TUC",
      "CUIABA": "CGB", "CUIABÁ": "CGB"
    };

    // ===== HELPER FUNCTIONS =====
    function airlineCode(name) {
      const key = (name || "").toUpperCase().trim();
      return AIRLINE_IATA[key] || AIRLINE_BACKUP[key] || null;
    }

    function normalizeHHMM(x) {
      const m = String(x || "").match(/(\d{1,2}):(\d{2})/);
      return m ? `${m[1].padStart(2, "0")}:${m[2]}` : null;
    }

    function todayWithHHMM(x) {
      const h = normalizeHHMM(x);
      if (!h) return null;
      const [hh, mm] = h.split(":").map(Number);
      const now = new Date();
      const d = new Date(now);
      d.setHours(hh, mm, 0, 0);
      if (d < now) d.setDate(d.getDate() + 1);
      return d;
    }

    function hhmm(d) {
      return d
        ? d.toLocaleTimeString("es-BO", { hour: "2-digit", minute: "2-digit", hour12: false })
        : "";
    }

    function destinationName(ruta0, ruta) {
      // RUTA0 = "COCHABAMBA - SANTA CRUZ", RUTA = "COCHABAMBA>>SANTA CRUZ"
      // Either can indicate multi-stop via "-" or ">>"
      const source = ruta0 || ruta;
      if (!source) return "";
      // Split by " - " or ">>" to find stops
      const stops = source.split(/\s*(?:>>|-)\s*/).filter(Boolean);
      const name = stops[0].toUpperCase();
      return stops.length > 1 ? name + "+" : name;
    }

    function statusInfo(obs) {
      const s = (obs || "").toUpperCase();
      if (s.includes("PRE")) return { text: "PRE-BOARD", css: "pre", preBoarding: true };
      if (s.includes("EMBAR") || s.includes("ABORD")) return { text: "BOARDING", css: "emb", boarding: true };
      if (s.includes("DEMOR") || s.includes("DELAY")) return { text: "DELAYED", css: "dem", delayed: true };
      if (s.includes("CANCEL")) return { text: "CANCELLED", css: "can", canceled: true };
      return { text: "ON TIME", css: "ok" };
    }

    function getHoraReal(op, f) {
      return f?.HORA_REAL || op?.HORA_REAL_SALIDA || op?.HORA_SALIDA_REAL || null;
    }

    // ===== PROXY FETCH =====
    async function proxyFetch(url) {
      const r = await fetch(PROXY_URL + '/?url=' + encodeURIComponent(url));
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }

    // ===== FETCH + MERGE =====
    async function fetchFlights(airportCode) {
      const airport = AIRPORTS[airportCode] || AIRPORTS.VVI;
      const urlItin = `https://fids.naabol.gob.bo/Fids/itin/vuelos?aero=${airport.query}&tipo=S`;
      const urlOps = `https://fids.naabol.gob.bo/Fids/operativo/vuelos?aero=${airport.query}&tipo=S`;

      const [itin, ops] = await Promise.all([
        proxyFetch(urlItin).catch(() => []),
        proxyFetch(urlOps).catch(() => [])
      ]);

      const opsMap = {};
      for (const o of (Array.isArray(ops) ? ops : [])) {
        const code = airlineCode(o.NOMBRE_AEROLINEA);
        const num = String(o.NRO_VUELO || "").trim();
        const key = code ? `${code}${num}` : num;
        opsMap[key] = o;
      }

      const now = Date.now();
      const max = now + HOURS_AHEAD * 3600 * 1000;

      const seenFlights = new Set();
      const flightsFromItin = (Array.isArray(itin) ? itin : [])
        .map(f => {
          const prog = todayWithHHMM(f.HORA_PROGRAMADA || f.HORA_ESTIMADA);
          if (!prog) return null;

          const code = airlineCode(f.NOMBRE_AEROLINEA);
          const num = String(f.NRO_VUELO || "").trim();
          const vuelo = code ? `${code}${num}` : num;
          seenFlights.add(vuelo);

          const op = opsMap[vuelo] || {};
          const est = statusInfo(op.ESTADO || op.COMENTARIOS || f.OBSERVACION);

          // Active flights bumped to tomorrow should stay today
          const isActive = est.delayed || est.preBoarding || est.boarding;
          if (isActive && prog.getTime() - Date.now() > HOURS_AHEAD * 3600 * 1000) {
            prog.setDate(prog.getDate() - 1);
          }

          return {
            prog,
            real: todayWithHHMM(getHoraReal(op, f)),
            ts: prog.getTime(),
            vuelo,
            est,
            destName: destinationName(f.RUTA0, f.RUTA || op.DESTINO)
          };
        })
        .filter(f => {
          if (!f) return false;
          const active = f.est.delayed || f.est.preBoarding || f.est.boarding;
          if (active) return true;
          return f.ts >= now && f.ts <= max;
        });

      const flightsFromOps = (Array.isArray(ops) ? ops : [])
        .map(o => {
          const code = airlineCode(o.NOMBRE_AEROLINEA);
          const num = String(o.NRO_VUELO || "").trim();
          const vuelo = code ? `${code}${num}` : num;

          if (seenFlights.has(vuelo)) return null;

          const prog = todayWithHHMM(o.HORA_ESTIMADA || o.HORA_PROGRAMADA);
          if (!prog) return null;

          const est = statusInfo(o.ESTADO || o.COMENTARIOS);

          const isActive = est.delayed || est.preBoarding || est.boarding;
          if (isActive && prog.getTime() - Date.now() > HOURS_AHEAD * 3600 * 1000) {
            prog.setDate(prog.getDate() - 1);
          }

          return {
            prog,
            real: todayWithHHMM(o.HORA_REAL || o.HORA_REAL_SALIDA),
            ts: prog.getTime(),
            vuelo,
            est,
            destName: destinationName(o.DESTINO, o.RUTA)
          };
        })
        .filter(f => {
          if (!f) return false;
          const active = f.est.delayed || f.est.preBoarding || f.est.boarding;
          if (active) return true;
          return f.ts >= now && f.ts <= max;
        });

      return [...flightsFromItin, ...flightsFromOps]
        .sort((a, b) => {
          const tA = a.real ? a.real.getTime() : a.ts;
          const tB = b.real ? b.real.getTime() : b.ts;
          return tA - tB;
        })
        .slice(0, maxFlights());
    }

    // ===== DOM RENDERING =====
    const STATUS_COLORS = {
      ok: '#FFFFFF',
      pre: '#FFD600',
      emb: '#4CAF50',
      dem: '#FF3D00',
      can: '#FF3D00'
    };

    function createFlap(ch, color) {
      const el = document.createElement('span');
      el.className = ch === ':' ? 'flap flap-colon' : 'flap';
      el.style.color = color;
      if (ch && ch !== ' ') el.textContent = ch;
      return el;
    }

    function createColGroup(text, maxChars, color, cssClass) {
      const group = document.createElement('div');
      group.className = 'col-group ' + cssClass;
      let display = text;
      // If text is too long and ends with +, truncate name but keep +
      if (display.length > maxChars && display.endsWith('+')) {
        display = display.slice(0, maxChars - 1) + '+';
      }
      const padded = display.padEnd(maxChars).slice(0, maxChars);
      for (const ch of padded) {
        group.appendChild(createFlap(ch, color));
      }
      return group;
    }

    function createSepGroup() {
      const group = document.createElement('div');
      group.className = 'col-group cg-sep';
      const flap = document.createElement('span');
      flap.className = 'flap flap-sep';
      group.appendChild(flap);
      return group;
    }

    function createTimeGroup(timeStr, color) {
      const group = document.createElement('div');
      group.className = 'col-group cg-time';
      for (const ch of timeStr) {
        group.appendChild(createFlap(ch, color));
      }
      return group;
    }

    function renderBoard(flights) {
      const container = document.getElementById('flights');
      const status = document.getElementById('status');
      container.innerHTML = '';

      if (flights.length === 0) {
        status.textContent = 'No hay vuelos programados';
        status.className = '';
        status.id = 'status';
        return;
      }

      status.textContent = '';

      for (const f of flights) {
        const row = document.createElement('div');
        row.className = 'flight-row';

        const hasReal = !!f.real;
        const timeStr = hasReal ? hhmm(f.real) : hhmm(f.prog);
        const timeColor = hasReal ? '#FF9800' : '#FFD600';
        const estColor = STATUS_COLORS[f.est.css] || '#FFD600';

        row.appendChild(createTimeGroup(timeStr || '     ', timeColor));
        row.appendChild(createSepGroup());
        row.appendChild(createColGroup(f.destName, DEST_CHARS, '#FFD600', 'cg-dest'));
        row.appendChild(createSepGroup());
        row.appendChild(createColGroup(f.vuelo, 6, '#FFD600', 'cg-flight'));
        row.appendChild(createSepGroup());
        row.appendChild(createColGroup(f.est.text, RMKS_CHARS, estColor, 'cg-rmks'));

        container.appendChild(row);
      }
    }

    // ===== SELECTOR =====
    let currentAirport = 'VVI';

    function initSelector() {
      const sel = document.getElementById('airport-select');
      for (const [code, info] of Object.entries(AIRPORTS)) {
        const opt = document.createElement('option');
        opt.value = code;
        opt.textContent = `${code} — ${info.name}`;
        if (code === currentAirport) opt.selected = true;
        sel.appendChild(opt);
      }
      sel.addEventListener('change', () => {
        currentAirport = sel.value;
        loadFlights();
      });
    }

    // ===== CLOCK =====
    function updateClock() {
      document.getElementById('clock').textContent = hhmm(new Date());
    }

    // ===== LOAD + RENDER =====
    async function loadFlights() {
      const status = document.getElementById('status');
      try {
        const flights = await fetchFlights(currentAirport);
        renderBoard(flights);
        document.getElementById('footer').textContent =
          'Actualizado: ' + new Date().toLocaleTimeString('es-BO', { hour: '2-digit', minute: '2-digit', hour12: false });
      } catch (e) {
        status.textContent = 'Error de conexión';
        status.className = 'error';
        status.id = 'status';
      }
    }

    function manualRefresh() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning');
      loadFlights().finally(() => {
        setTimeout(() => btn.classList.remove('spinning'), 800);
      });
    }

    // ===== AUTO-REFRESH with visibility =====
    let refreshTimer = null;

    function startAutoRefresh() {
      stopAutoRefresh();
      refreshTimer = setInterval(loadFlights, 5 * 60 * 1000);
    }

    function stopAutoRefresh() {
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopAutoRefresh();
      } else {
        loadFlights();
        startAutoRefresh();
      }
    });

    // ===== RECALC ON RESIZE =====
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => loadFlights(), 200);
    });

    // ===== INIT =====
    initSelector();
    updateClock();
    setInterval(updateClock, 1000);
    loadFlights();
    startAutoRefresh();
  </script>
</body>
</html>
