<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dólar Bolivia</title>
<style>
  body { 
    margin:0; 
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; 
    background:#1f2937; 
    color:#fff 
  }
  .card { 
    width:320px; 
    padding:16px; 
    border-radius:14px; 
    box-shadow:0 6px 18px rgba(0,0,0,.18) 
  }
  h3 {
    margin: 0 0 12px;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
  }
  .buy { 
    background:#22c55e; 
    padding:10px; 
    border-radius:8px; 
    margin-bottom:8px; 
    color:#052e16; 
    font-weight:600 
  }
  .sell { 
    background:#3b82f6; 
    padding:10px; 
    border-radius:8px; 
    color:#05203f; 
    font-weight:600 
  }
</style>
</head>
<body>
  <div class="card">
    <h3>Dólar Bolivia</h3>
    <div id="buy" class="buy">Cargando…</div>
    <div id="sell" class="sell">Cargando…</div>
  </div>

<script>
fetch("/exchange")
  .then(r => r.json())
  .then(d => {
    document.getElementById("buy").textContent = `Compra: ${Number(d.buy).toFixed(2)} BOB`;
    document.getElementById("sell").textContent = `Venta: ${Number(d.sell).toFixed(2)} BOB`;
  })
  .catch(() => {
    document.getElementById("buy").textContent = "Error";
    document.getElementById("sell").textContent = "Error";
  });
</script>
</body>
</html>
